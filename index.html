<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่งเอกสารเช็คเบี้ย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body class="bg-gray-100 p-4 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center">ส่งเอกสารเช็คเบี้ย 📄</h2>

        <div id="profileBox"
            class="text-sm text-blue-600 bg-blue-50 p-3 rounded-lg border border-blue-100 mb-6 text-center shadow-inner">
            กำลังเชื่อมต่อระบบ...
        </div>

        <form id="policyForm" class="space-y-4">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ตัวแทนผู้แจ้งงาน <span
                        class="text-red-500">*</span></label>
                <select id="informer_id" required
                    class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 bg-white">
                    <option value="" disabled selected>⏳ กำลังโหลดรายชื่อตัวแทน...</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่ <span
                        class="text-red-500">*</span></label>
                <select id="category_id"
                    class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 bg-white">
                    <option value="1">ประกันรถยนต์ (Motor)</option>
                    <option value="2">ประกันอื่นๆ (Non-Motor)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">วัตถุประสงค์ <span
                        class="text-red-500">*</span></label>
                <select id="submission_type"
                    class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 bg-white">
                    <option value="new">🆕 แจ้งเช็คเบี้ยใหม่</option>
                    <option value="additional">📎 ส่งเอกสารเพิ่มเติม (อัปเดตงานเดิม)</option>
                </select>
            </div>

            <div>
                <label id="reference_label" class="block text-sm font-medium text-gray-700 mb-1">ทะเบียนรถ <span
                        class="text-red-500">*</span></label>
                <input type="text" id="reference_input" required placeholder="เช่น 1กข-1234 กทม"
                    class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">วันที่ประกันเดิมหมดอายุ (ถ้าทราบ)</label>
                <input type="date" id="end_date"
                    class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">

                <!-- 🟢 ฟีเจอร์ตั้งเตือนให้ออกใบเสนอราคาภายหลัง -->
                <div class="mt-3 bg-blue-50 border border-blue-100 rounded-lg p-3">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="enable_reminder"
                            class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                        <span class="ml-2 text-sm font-medium text-blue-800">ตั้งเตือนให้ออกใบเสนอราคาล่วงหน้า</span>
                    </label>

                    <div id="reminder_date_container" class="mt-3 hidden">
                        <label
                            class="block text-xs font-semibold text-gray-600 mb-1">วันที่ต้องการให้ระบบแจ้งเตือนกลับ</label>
                        <input type="date" id="reminder_date"
                            class="block w-full rounded-md border-gray-300 shadow-sm p-2 text-sm border focus:ring-blue-500 focus:border-blue-500">
                        <p class="text-[11px] text-gray-500 mt-1">* ระบบจะส่งข้อความแจ้งเตือนผ่าน LINE
                            ไปหาคุณในวันที่กำหนด</p>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">แนบเอกสารตามประเภท <span
                        class="text-red-500">*</span> <span class="text-xs text-gray-400 font-normal">(แนบอย่างน้อย 1
                        ช่อง)</span></label>

                <div class="space-y-3 p-3 bg-gray-50 rounded-lg border border-gray-200 shadow-inner">
                    <div tabindex="0"
                        class="dropzone relative p-3 border-2 border-dashed border-gray-300 rounded-lg transition-colors hover:border-blue-400 focus:outline-none focus:border-blue-500 focus:bg-blue-50 focus:ring-4 focus:ring-blue-100 bg-white">
                        <label class="block text-xs font-bold text-gray-700 mb-2 cursor-pointer pointer-events-none">1.
                            หน้ารายการจดทะเบียน / สำเนารถ <span class="font-normal text-blue-500 ml-1">(คลิกที่นี่แล้วกด
                                Ctrl+V เพื่อวางรูป)</span></label>
                        <input type="file" id="file_registration" accept=".pdf,image/*"
                            class="block w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition cursor-pointer">
                    </div>
                    <div tabindex="0"
                        class="dropzone relative p-3 border-2 border-dashed border-gray-300 rounded-lg transition-colors hover:border-blue-400 focus:outline-none focus:border-blue-500 focus:bg-blue-50 focus:ring-4 focus:ring-blue-100 bg-white">
                        <label class="block text-xs font-bold text-gray-700 mb-2 cursor-pointer pointer-events-none">2.
                            กรมธรรม์เดิม <span class="font-normal text-blue-500 ml-1">(คลิกที่นี่แล้วกด Ctrl+V
                                เพื่อวางรูป)</span></label>
                        <input type="file" id="file_old_policy" accept=".pdf,image/*"
                            class="block w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition cursor-pointer">
                    </div>
                    <div tabindex="0"
                        class="dropzone relative p-3 border-2 border-dashed border-gray-300 rounded-lg transition-colors hover:border-blue-400 focus:outline-none focus:border-blue-500 focus:bg-blue-50 focus:ring-4 focus:ring-blue-100 bg-white">
                        <label class="block text-xs font-bold text-gray-700 mb-2 cursor-pointer pointer-events-none">3.
                            ใบเสนอราคา <span class="font-normal text-blue-500 ml-1">(คลิกที่นี่แล้วกด Ctrl+V
                                เพื่อวางรูป)</span></label>
                        <input type="file" id="file_quotation" accept=".pdf,image/*"
                            class="block w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition cursor-pointer">
                    </div>
                    <div tabindex="0"
                        class="dropzone relative p-3 border-2 border-dashed border-gray-300 rounded-lg transition-colors hover:border-blue-400 focus:outline-none focus:border-blue-500 focus:bg-blue-50 focus:ring-4 focus:ring-blue-100 bg-white">
                        <label class="block text-xs font-bold text-gray-700 mb-2 cursor-pointer pointer-events-none">4.
                            ใบเสนอราคาคู่แข่ง <span class="font-normal text-blue-500 ml-1">(คลิกที่นี่แล้วกด Ctrl+V
                                เพื่อวางรูป)</span></label>
                        <input type="file" id="file_comp_quotation" accept=".pdf,image/*"
                            class="block w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition cursor-pointer">
                    </div>
                    <div tabindex="0"
                        class="dropzone relative p-3 border-2 border-dashed border-gray-300 rounded-lg transition-colors hover:border-blue-400 focus:outline-none focus:border-blue-500 focus:bg-blue-50 focus:ring-4 focus:ring-blue-100 bg-white">
                        <label class="block text-xs font-bold text-gray-700 mb-2 cursor-pointer pointer-events-none">5.
                            เอกสารอื่นๆ (แนบได้หลายไฟล์) <span class="font-normal text-blue-500 ml-1">(คลิกที่นี่แล้วกด
                                Ctrl+V)</span></label>
                        <input type="file" id="file_others" accept=".pdf,image/*" multiple
                            class="block w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition cursor-pointer">
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-200 mt-4 shadow-sm">
                ส่งข้อมูลเช็คเบี้ย
            </button>
        </form>
    </div>

    <!-- Image Modal for Previews -->
    <div id="image_modal"
        class="fixed inset-0 z-50 hidden bg-black bg-opacity-80 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity"
        onclick="this.classList.add('hidden')">
        <span
            class="absolute top-4 right-4 text-white text-4xl font-bold cursor-pointer hover:text-gray-300">&times;</span>
        <img id="modal_image" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl"
            onclick="event.stopPropagation()">
    </div>

    <script>
        const myLiffId = "2009445757-eTSIMGmL";
        const apiUrl = "https://bgmmrxczsikxcgwayomc.supabase.co/functions/v1/submit-policy";

        // 🟢 ฟังก์ชันสำหรับดึงรายชื่อตัวแทนมาใส่ใน Dropdown
        async function loadAgents() {
            try {
                const response = await fetch(apiUrl, { method: 'GET' });
                const result = await response.json();
                const select = document.getElementById('informer_id');

                if (result.success && result.agents) {
                    select.innerHTML = '<option value="" disabled selected>-- เลือกตัวแทนผู้แจ้งงาน --</option>';
                    result.agents.forEach(agent => {
                        const option = document.createElement('option');
                        option.value = agent.agent_id;
                        // สร้างรูปแบบ "ชื่อ นามสกุล (AM001)"
                        option.textContent = `${agent.full_name} (${agent.agent_id})`;
                        select.appendChild(option);
                    });
                } else {
                    select.innerHTML = '<option value="" disabled>โหลดรายชื่อไม่สำเร็จ</option>';
                }
            } catch (error) {
                console.error("Error loading agents:", error);
            }
        }

        async function initializeLiff() {
            try {
                await liff.init({ liffId: myLiffId });

                // ให้โหลดรายชื่อตัวแทนทันทีที่หน้าเว็บเปิดขึ้นมา
                loadAgents();

                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('profileBox').innerHTML = `👤 เข้าสู่ระบบด้วย LINE: <b>${profile.displayName}</b>`;
                } else {
                    liff.login();
                }
            } catch (err) {
                document.getElementById('profileBox').innerHTML = '<span class="text-red-500">❌ เชื่อมต่อ LINE ไม่สำเร็จ</span>';
            }
        }

        initializeLiff();

        // 🟢 ฟังก์ชันจัดกล่อง Dropzone ให้รองรับการลากไฟล์มาใส่
        function setupDropzones() {
            const dropzones = document.querySelectorAll('.dropzone');
            dropzones.forEach(zone => {
                const fileInput = zone.querySelector('input[type="file"]');

                ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                    zone.addEventListener(eventName, preventDefaults, false);
                });

                function preventDefaults(e) {
                    e.preventDefault();
                    e.stopPropagation();
                }

                // เอฟเฟกต์เวลาลากไฟล์มาจ่อ (Highlight)
                ['dragenter', 'dragover'].forEach(eventName => {
                    zone.addEventListener(eventName, () => {
                        zone.classList.remove('border-gray-300', 'bg-white');
                        zone.classList.add('border-blue-500', 'bg-blue-50');
                    }, false);
                });

                // เอาเอฟเฟกต์ออกแบบเอาไฟล์ออก/วางไปแล้ว
                ['dragleave', 'drop'].forEach(eventName => {
                    zone.addEventListener(eventName, () => {
                        zone.classList.remove('border-blue-500', 'bg-blue-50');
                        zone.classList.add('border-gray-300', 'bg-white');
                    }, false);
                });

                // ตอนปล่อยเมาส์วางไฟล์
                zone.addEventListener('drop', (e) => {
                    const dt = e.dataTransfer;
                    const files = dt.files;
                    if (files && files.length > 0) {
                        fileInput.files = files; // จับไฟล์ยัดเข้า input

                        // Trigger event เพื่อให้เบราว์เซอร์รับรู้ว่ามีไฟล์เปลี่ยน (แสดงชื่อไฟล์)
                        const event = new Event('change', { bubbles: true });
                        fileInput.dispatchEvent(event);
                    }
                });

                // รองรับการกด Ctrl+V (Paste) รูปภาพลงในกล่อง
                zone.addEventListener('paste', (e) => {
                    const items = e.clipboardData.items;
                    const files = [];
                    for (let i = 0; i < items.length; i++) {
                        if (items[i].kind === 'file') {
                            files.push(items[i].getAsFile());
                        }
                    }
                    if (files.length > 0) {
                        // Create a DataTransfer object to assign files to input
                        const dataTransfer = new DataTransfer();
                        files.forEach(file => dataTransfer.items.add(file));
                        fileInput.files = dataTransfer.files;

                        const event = new Event('change', { bubbles: true });
                        fileInput.dispatchEvent(event);

                        // แสดงเอฟเฟกต์ว่าวางสำเร็จ
                        zone.classList.remove('border-gray-300', 'bg-white', 'border-blue-500', 'bg-blue-50');
                        zone.classList.add('border-green-500', 'bg-green-50');
                        setTimeout(() => {
                            zone.classList.remove('border-green-500', 'bg-green-50');
                            // คืนค่ารูปแบบโฟกัส (สีฟ้า) เพราะกล่องยังคงถูกโฟกัสอยู่
                            zone.classList.add('border-blue-500', 'bg-blue-50');
                        }, 500);
                    }
                });
            });
        }
        setupDropzones();

        // 🟢 ฟังก์ชันแสดง Preview ภาพและปุ่มลบ
        function setupPreviews() {
            const fileInputs = document.querySelectorAll('.dropzone input[type="file"]');

            fileInputs.forEach(input => {
                input.addEventListener('change', function (e) {
                    const zone = this.closest('.dropzone');
                    let previewContainer = zone.querySelector('.preview-container');

                    if (!previewContainer) {
                        previewContainer = document.createElement('div');
                        previewContainer.className = 'preview-container mt-3 grid grid-cols-4 gap-2';
                        zone.appendChild(previewContainer);
                    }

                    // กันการคลิกที่รูปแล้วส่งผลต่อ element อื่น
                    previewContainer.onclick = (eClick) => eClick.stopPropagation();

                    previewContainer.innerHTML = ''; // เคลียร์ของเก่า

                    const files = Array.from(this.files);
                    files.forEach((file, index) => {
                        const item = document.createElement('div');
                        item.className = 'relative group rounded-md overflow-hidden bg-gray-100 border border-gray-200 aspect-square flex items-center justify-center';

                        // ปุ่มลบรูป
                        const removeBtn = document.createElement('button');
                        removeBtn.className = 'absolute top-1 right-1 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs sm:opacity-0 group-hover:opacity-100 transition-opacity z-10 hover:bg-red-600 focus:outline-none shadow pointer-events-auto';
                        removeBtn.innerHTML = '✕';
                        removeBtn.title = "ลบไฟล์นี้";
                        removeBtn.onclick = (eBtn) => {
                            eBtn.preventDefault();
                            eBtn.stopPropagation(); // กันไม่ให้ไปทริกเกอร์อย่างอื่น
                            removeFile(input, index);
                        };

                        item.appendChild(removeBtn);

                        if (file.type.startsWith('image/')) {
                            const img = document.createElement('img');
                            img.className = 'object-cover w-full h-full cursor-pointer hover:opacity-80 transition-opacity';
                            img.title = "คลิกเพื่อดูรูปใหญ่";

                            const reader = new FileReader();
                            reader.onload = (eReader) => {
                                img.src = eReader.target.result;
                                img.onclick = (eClick) => {
                                    eClick.stopPropagation();
                                    const modal = document.getElementById('image_modal');
                                    const modalImg = document.getElementById('modal_image');
                                    modalImg.src = img.src;
                                    modal.classList.remove('hidden');
                                };
                            };
                            reader.readAsDataURL(file);
                            item.appendChild(img);
                        } else {
                            // เป็นไฟล์อื่น (เช่น PDF)
                            const icon = document.createElement('div');
                            icon.className = 'flex flex-col items-center p-1 w-full';
                            icon.innerHTML = `<span class="text-[10px] font-bold text-gray-500 truncate w-full px-1 text-center">${file.name}</span>`;
                            item.appendChild(icon);
                        }

                        previewContainer.appendChild(item);
                    });
                });
            });
        }

        function removeFile(input, indexToRemove) {
            const dt = new DataTransfer();
            const files = Array.from(input.files);
            files.forEach((file, index) => {
                if (index !== indexToRemove) {
                    dt.items.add(file);
                }
            });
            input.files = dt.files;
            // สั่งอัปเดต UI 
            input.dispatchEvent(new Event('change', { bubbles: true }));
        }

        setupPreviews();

        // ลอจิกตั้งเตือนล่วงหน้า
        document.getElementById('enable_reminder').addEventListener('change', function (e) {
            const container = document.getElementById('reminder_date_container');
            const reminderInput = document.getElementById('reminder_date');
            if (e.target.checked) {
                container.classList.remove('hidden');
                reminderInput.required = true;

                // ถ้ามี end_date อยู่แล้ว ลองถอยกลับ 60 วันให้อัตโนมัติเป็น Default
                const endDateVal = document.getElementById('end_date').value;
                if (endDateVal && !reminderInput.value) {
                    const endDate = new Date(endDateVal);
                    endDate.setDate(endDate.getDate() - 60);
                    reminderInput.valueAsDate = endDate;
                }
            } else {
                container.classList.add('hidden');
                reminderInput.required = false;
                reminderInput.value = '';
            }
        });

        // ลอจิกเปลี่ยน UI
        document.getElementById('category_id').addEventListener('change', function (e) {
            const refLabel = document.getElementById('reference_label');
            const refInput = document.getElementById('reference_input');
            if (e.target.value === '1') {
                refLabel.innerHTML = 'ทะเบียนรถ <span class="text-red-500">*</span>';
                refInput.placeholder = 'เช่น 1กข-1234 กทม';
            } else {
                refLabel.innerHTML = 'ชื่อผู้เอาประกัน <span class="text-red-500">*</span>';
                refInput.placeholder = 'เช่น สมชาย ใจดี';
            }
        });

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById('policyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnText = submitBtn.innerText;

            const idToken = liff.getIDToken();
            if (!idToken) return alert('❌ กรุณาเข้าสู่ระบบผ่านแอป LINE');

            submitBtn.disabled = true;
            submitBtn.innerText = '⏳ กำลังเตรียมไฟล์...';
            submitBtn.classList.replace('bg-blue-600', 'bg-gray-400');

            try {
                const categoryId = parseInt(document.getElementById('category_id').value);
                const refValue = document.getElementById('reference_input').value;
                let plateNumber = null;
                let customerName = null;

                if (categoryId === 1) {
                    plateNumber = refValue;
                } else {
                    customerName = refValue;
                }

                // ทำความสะอาดชื่อ refValue สำหรับใช้ตั้งชื่อไฟล์
                const safeRef = refValue.replace(/[\/\\:*?"<>|]/g, '_').replace(/\s+/g, '_');

                const fileInputs = [
                    { id: 'file_registration', docType: 'หน้ารายการจดทะเบียน' },
                    { id: 'file_old_policy', docType: 'กรมธรรม์เดิม' },
                    { id: 'file_quotation', docType: 'ใบเสนอราคา' },
                    { id: 'file_comp_quotation', docType: 'ใบเสนอราคาคู่แข่ง' },
                    { id: 'file_others', docType: 'เอกสารอื่นๆ' }
                ];

                let uploadedFiles = [];
                let hasFiles = false;

                for (const inputDef of fileInputs) {
                    const inputElement = document.getElementById(inputDef.id);
                    if (inputElement.files.length > 0) {
                        hasFiles = true;

                        const filePromises = Array.from(inputElement.files).map(async (file, index) => {
                            const base64Data = await getBase64(file);
                            const ext = file.name.split('.').pop() || 'pdf';

                            // ดึงค่าวัตถุประสงค์มาเช็ค
                            const subType = document.getElementById('submission_type').value;

                            // เช่น: 1กข-1234_หน้ารายการจดทะเบียน
                            let newFileName = `${safeRef}_${inputDef.docType}`;

                            // ถ่ายรูปเอกสารเพิ่มเติม ให้ห้อยท้ายด้วย timestamp เพื่อให้ไม่ทับของเก่า
                            if (subType === 'additional') {
                                newFileName += `_เพิ่มเติม_${Date.now()}`;
                            }

                            // กรณีอัพโหลดหลายไฟล์ในช่องเดียว (เอกสารอื่นๆ) ให้เติมเลขลำดับ
                            if (inputElement.files.length > 1) {
                                newFileName += `_${index + 1}`;
                            }
                            newFileName += `.${ext}`;

                            return { base64: base64Data, fileName: newFileName, mimeType: file.type };
                        });

                        const files = await Promise.all(filePromises);
                        uploadedFiles = uploadedFiles.concat(files);
                    }
                }

                // กรณีไม่ได้แนบเอกสารเลยสักช่องเดียว
                if (!hasFiles) {
                    alert('❌ กรุณาแนบเอกสารอย่างน้อย 1 รายการ');
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalBtnText;
                    submitBtn.classList.replace('bg-gray-400', 'bg-blue-600');
                    return;
                }

                // 🟢 เพิ่ม informer_id และข้อมูลการแจ้งเตือนลงไปใน Payload
                const payload = {
                    idToken: idToken,
                    informer_id: document.getElementById('informer_id').value,
                    category_id: categoryId,
                    submission_type: document.getElementById('submission_type').value,
                    plate_number: plateNumber,
                    customer_name: customerName,
                    end_date: document.getElementById('end_date').value || null,
                    reminder_date: document.getElementById('enable_reminder').checked ? document.getElementById('reminder_date').value : null,
                    files: uploadedFiles
                };

                submitBtn.innerText = '⏳ กำลังบันทึกข้อมูล...';

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (response.ok) {
                    alert('✅ ' + result.message);
                    if (liff.isInClient()) liff.closeWindow();
                    else document.getElementById('policyForm').reset();
                } else {
                    alert('❌ ' + (result.error || 'เกิดข้อผิดพลาด'));
                }
            } catch (error) {
                alert('❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
                submitBtn.classList.replace('bg-gray-400', 'bg-blue-600');
            }
        });
    </script>
</body>

</html>
