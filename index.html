<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่งเอกสารเช็คเบี้ย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body class="bg-gray-100 p-4 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center">ส่งเอกสารเช็คเบี้ย 📄</h2>

        <div id="profileBox"
            class="text-sm text-blue-600 bg-blue-50 p-3 rounded-lg border border-blue-100 mb-6 text-center shadow-inner">
            กำลังเชื่อมต่อระบบ...
        </div>

        <form id="policyForm" class="space-y-4">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ตัวแทนผู้แจ้งงาน <span
                        class="text-red-500">*</span></label>
                <select id="informer_id" required
                    class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 bg-white">
                    <option value="" disabled selected>⏳ กำลังโหลดรายชื่อตัวแทน...</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่ <span
                        class="text-red-500">*</span></label>
                <select id="category_id"
                    class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 bg-white">
                    <option value="1">ประกันรถยนต์ (Motor)</option>
                    <option value="2">ประกันอื่นๆ (Non-Motor)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">วัตถุประสงค์ <span
                        class="text-red-500">*</span></label>
                <select id="submission_type"
                    class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 bg-white">
                    <option value="new">🆕 แจ้งเช็คเบี้ยใหม่</option>
                    <option value="additional">📎 ส่งเอกสารเพิ่มเติม (อัปเดตงานเดิม)</option>
                </select>
            </div>

            <div>
                <label id="reference_label" class="block text-sm font-medium text-gray-700 mb-1">ทะเบียนรถ <span
                        class="text-red-500">*</span></label>
                <input type="text" id="reference_input" required placeholder="เช่น 1กข-1234 กทม"
                    class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">วันที่ประกันเดิมหมดอายุ (ถ้าทราบ)</label>
                <input type="date" id="end_date"
                    class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">แนบเอกสารตามประเภท <span
                        class="text-red-500">*</span> <span class="text-xs text-gray-400 font-normal">(แนบอย่างน้อย 1
                        ช่อง)</span></label>

                <div class="space-y-3 p-3 bg-gray-50 rounded-lg border border-gray-200 shadow-inner">
                    <div
                        class="dropzone relative p-3 border-2 border-dashed border-gray-300 rounded-lg transition-colors hover:border-blue-400 bg-white">
                        <label class="block text-xs font-bold text-gray-700 mb-2 cursor-pointer">1. หน้ารายการจดทะเบียน
                            / สำเนารถ</label>
                        <input type="file" id="file_registration" accept=".pdf,image/*"
                            class="block w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition cursor-pointer">
                    </div>
                    <div
                        class="dropzone relative p-3 border-2 border-dashed border-gray-300 rounded-lg transition-colors hover:border-blue-400 bg-white">
                        <label class="block text-xs font-bold text-gray-700 mb-2 cursor-pointer">2. กรมธรรม์เดิม</label>
                        <input type="file" id="file_old_policy" accept=".pdf,image/*"
                            class="block w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition cursor-pointer">
                    </div>
                    <div
                        class="dropzone relative p-3 border-2 border-dashed border-gray-300 rounded-lg transition-colors hover:border-blue-400 bg-white">
                        <label class="block text-xs font-bold text-gray-700 mb-2 cursor-pointer">3. ใบเสนอราคา</label>
                        <input type="file" id="file_quotation" accept=".pdf,image/*"
                            class="block w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition cursor-pointer">
                    </div>
                    <div
                        class="dropzone relative p-3 border-2 border-dashed border-gray-300 rounded-lg transition-colors hover:border-blue-400 bg-white">
                        <label class="block text-xs font-bold text-gray-700 mb-2 cursor-pointer">4.
                            ใบเสนอราคาคู่แข่ง</label>
                        <input type="file" id="file_comp_quotation" accept=".pdf,image/*"
                            class="block w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition cursor-pointer">
                    </div>
                    <div
                        class="dropzone relative p-3 border-2 border-dashed border-gray-300 rounded-lg transition-colors hover:border-blue-400 bg-white">
                        <label class="block text-xs font-bold text-gray-700 mb-2 cursor-pointer">5. เอกสารอื่นๆ
                            (แนบได้หลายไฟล์)</label>
                        <input type="file" id="file_others" accept=".pdf,image/*" multiple
                            class="block w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition cursor-pointer">
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-200 mt-4 shadow-sm">
                ส่งข้อมูลเช็คเบี้ย
            </button>
        </form>
    </div>

    <script>
        const myLiffId = "2009445757-eTSIMGmL";
        const apiUrl = "https://bgmmrxczsikxcgwayomc.supabase.co/functions/v1/submit-policy";

        // 🟢 ฟังก์ชันสำหรับดึงรายชื่อตัวแทนมาใส่ใน Dropdown
        async function loadAgents() {
            try {
                const response = await fetch(apiUrl, { method: 'GET' });
                const result = await response.json();
                const select = document.getElementById('informer_id');

                if (result.success && result.agents) {
                    select.innerHTML = '<option value="" disabled selected>-- เลือกตัวแทนผู้แจ้งงาน --</option>';
                    result.agents.forEach(agent => {
                        const option = document.createElement('option');
                        option.value = agent.agent_id;
                        // สร้างรูปแบบ "ชื่อ นามสกุล (AM001)"
                        option.textContent = `${agent.full_name} (${agent.agent_id})`;
                        select.appendChild(option);
                    });
                } else {
                    select.innerHTML = '<option value="" disabled>โหลดรายชื่อไม่สำเร็จ</option>';
                }
            } catch (error) {
                console.error("Error loading agents:", error);
            }
        }

        async function initializeLiff() {
            try {
                await liff.init({ liffId: myLiffId });

                // ให้โหลดรายชื่อตัวแทนทันทีที่หน้าเว็บเปิดขึ้นมา
                loadAgents();

                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('profileBox').innerHTML = `👤 เข้าสู่ระบบด้วย LINE: <b>${profile.displayName}</b>`;
                } else {
                    liff.login();
                }
            } catch (err) {
                document.getElementById('profileBox').innerHTML = '<span class="text-red-500">❌ เชื่อมต่อ LINE ไม่สำเร็จ</span>';
            }
        }

        initializeLiff();

        // 🟢 ฟังก์ชันจัดกล่อง Dropzone ให้รองรับการลากไฟล์มาใส่
        function setupDropzones() {
            const dropzones = document.querySelectorAll('.dropzone');
            dropzones.forEach(zone => {
                const fileInput = zone.querySelector('input[type="file"]');

                ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                    zone.addEventListener(eventName, preventDefaults, false);
                });

                function preventDefaults(e) {
                    e.preventDefault();
                    e.stopPropagation();
                }

                // เอฟเฟกต์เวลาลากไฟล์มาจ่อ (Highlight)
                ['dragenter', 'dragover'].forEach(eventName => {
                    zone.addEventListener(eventName, () => {
                        zone.classList.remove('border-gray-300', 'bg-white');
                        zone.classList.add('border-blue-500', 'bg-blue-50');
                    }, false);
                });

                // เอาเอฟเฟกต์ออกแบบเอาไฟล์ออก/วางไปแล้ว
                ['dragleave', 'drop'].forEach(eventName => {
                    zone.addEventListener(eventName, () => {
                        zone.classList.remove('border-blue-500', 'bg-blue-50');
                        zone.classList.add('border-gray-300', 'bg-white');
                    }, false);
                });

                // ตอนปล่อยเมาส์วางไฟล์
                zone.addEventListener('drop', (e) => {
                    const dt = e.dataTransfer;
                    const files = dt.files;
                    if (files && files.length > 0) {
                        fileInput.files = files; // จับไฟล์ยัดเข้า input

                        // Trigger event เพื่อให้เบราว์เซอร์รับรู้ว่ามีไฟล์เปลี่ยน (แสดงชื่อไฟล์)
                        const event = new Event('change', { bubbles: true });
                        fileInput.dispatchEvent(event);
                    }
                });
            });
        }
        setupDropzones();

        // ลอจิกเปลี่ยน UI
        document.getElementById('category_id').addEventListener('change', function (e) {
            const refLabel = document.getElementById('reference_label');
            const refInput = document.getElementById('reference_input');
            if (e.target.value === '1') {
                refLabel.innerHTML = 'ทะเบียนรถ <span class="text-red-500">*</span>';
                refInput.placeholder = 'เช่น 1กข-1234 กทม';
            } else {
                refLabel.innerHTML = 'ชื่อผู้เอาประกัน <span class="text-red-500">*</span>';
                refInput.placeholder = 'เช่น สมชาย ใจดี';
            }
        });

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById('policyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnText = submitBtn.innerText;

            const idToken = liff.getIDToken();
            if (!idToken) return alert('❌ กรุณาเข้าสู่ระบบผ่านแอป LINE');

            submitBtn.disabled = true;
            submitBtn.innerText = '⏳ กำลังเตรียมไฟล์...';
            submitBtn.classList.replace('bg-blue-600', 'bg-gray-400');

            try {
                const categoryId = parseInt(document.getElementById('category_id').value);
                const refValue = document.getElementById('reference_input').value;
                let plateNumber = null;
                let customerName = null;

                if (categoryId === 1) {
                    plateNumber = refValue;
                } else {
                    customerName = refValue;
                }

                // ทำความสะอาดชื่อ refValue สำหรับใช้ตั้งชื่อไฟล์
                const safeRef = refValue.replace(/[\/\\:*?"<>|]/g, '_').replace(/\s+/g, '_');

                const fileInputs = [
                    { id: 'file_registration', docType: 'หน้ารายการจดทะเบียน' },
                    { id: 'file_old_policy', docType: 'กรมธรรม์เดิม' },
                    { id: 'file_quotation', docType: 'ใบเสนอราคา' },
                    { id: 'file_comp_quotation', docType: 'ใบเสนอราคาคู่แข่ง' },
                    { id: 'file_others', docType: 'เอกสารอื่นๆ' }
                ];

                let uploadedFiles = [];
                let hasFiles = false;

                for (const inputDef of fileInputs) {
                    const inputElement = document.getElementById(inputDef.id);
                    if (inputElement.files.length > 0) {
                        hasFiles = true;

                        const filePromises = Array.from(inputElement.files).map(async (file, index) => {
                            const base64Data = await getBase64(file);
                            const ext = file.name.split('.').pop() || 'pdf';

                            // ดึงค่าวัตถุประสงค์มาเช็ค
                            const subType = document.getElementById('submission_type').value;

                            // เช่น: 1กข-1234_หน้ารายการจดทะเบียน
                            let newFileName = `${safeRef}_${inputDef.docType}`;

                            // ถ่ายรูปเอกสารเพิ่มเติม ให้ห้อยท้ายด้วย timestamp เพื่อให้ไม่ทับของเก่า
                            if (subType === 'additional') {
                                newFileName += `_เพิ่มเติม_${Date.now()}`;
                            }

                            // กรณีอัพโหลดหลายไฟล์ในช่องเดียว (เอกสารอื่นๆ) ให้เติมเลขลำดับ
                            if (inputElement.files.length > 1) {
                                newFileName += `_${index + 1}`;
                            }
                            newFileName += `.${ext}`;

                            return { base64: base64Data, fileName: newFileName, mimeType: file.type };
                        });

                        const files = await Promise.all(filePromises);
                        uploadedFiles = uploadedFiles.concat(files);
                    }
                }

                // กรณีไม่ได้แนบเอกสารเลยสักช่องเดียว
                if (!hasFiles) {
                    alert('❌ กรุณาแนบเอกสารอย่างน้อย 1 รายการ');
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalBtnText;
                    submitBtn.classList.replace('bg-gray-400', 'bg-blue-600');
                    return;
                }

                // 🟢 เพิ่ม informer_id ลงไปใน Payload
                const payload = {
                    idToken: idToken,
                    informer_id: document.getElementById('informer_id').value,
                    category_id: categoryId,
                    submission_type: document.getElementById('submission_type').value,
                    plate_number: plateNumber,
                    customer_name: customerName,
                    end_date: document.getElementById('end_date').value || null,
                    files: uploadedFiles
                };

                submitBtn.innerText = '⏳ กำลังบันทึกข้อมูล...';

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (response.ok) {
                    alert('✅ ' + result.message);
                    if (liff.isInClient()) liff.closeWindow();
                    else document.getElementById('policyForm').reset();
                } else {
                    alert('❌ ' + (result.error || 'เกิดข้อผิดพลาด'));
                }
            } catch (error) {
                alert('❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
                submitBtn.classList.replace('bg-gray-400', 'bg-blue-600');
            }
        });
    </script>
</body>

</html>
